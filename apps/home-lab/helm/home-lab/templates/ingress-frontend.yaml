{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "home-lab.fullname" . }}-frontend
  labels:
    {{- include "home-lab.labels" . | nindent 4 }}
  {{- with .Values.ingress.frontend.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- if .Values.ingress.host }}
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: {{ .Values.ingress.frontend.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "home-lab.fullname" . }}-frontend
                port:
                  name: http
    {{- else }}
    - http:
        paths:
          - path: {{ .Values.ingress.frontend.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "home-lab.fullname" . }}-frontend
                port:
                  name: http
    {{- end }}
{{- end }}
