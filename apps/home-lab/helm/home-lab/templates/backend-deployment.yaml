apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "home-lab.fullname" . }}-backend
  labels:
    {{- include "home-lab.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "home-lab.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "home-lab.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      {{- include "home-lab.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
              protocol: TCP
          env:
            - name: ACCESS_CODE
              valueFrom:
                secretKeyRef:
                  name: {{ include "home-lab.fullname" . }}
                  key: access-code
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "home-lab.fullname" . }}
                  key: jwt-secret
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "home-lab.fullname" . }}
                  key: google-client-id
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "home-lab.fullname" . }}
                  key: google-client-secret
            - name: GOOGLE_REDIRECT_URI
              value: {{ .Values.backend.google.redirectUri | quote }}
            - name: GOOGLE_CALENDAR_ID
              value: {{ .Values.backend.google.calendarId | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /app/data
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "home-lab.fullname" . }}-data
      {{- end }}
