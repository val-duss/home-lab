nameOverride: ""
fullnameOverride: ""

# ── Image pull secret (registre privé, ex: GHCR) ───────────────────────────────
# Référence un secret docker-registry existant dans le cluster (créé au préalable
# avec `kubectl create secret docker-registry ghcr-creds ...`).
imagePullSecrets:
  - name: ghcr-creds
# Ou laisse le chart créer le secret à partir d'identifiants (déconseillé si ce
# values.yaml est versionné en clair) :
# imageCredentials:
#   registry: ghcr.io
#   username: ""
#   password: ""

# ── Backend ───────────────────────────────────────────────────────────────────
backend:
  image:
    repository: ghcr.io/val-duss/home-lab-backend
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 8000
  # Clé de signature des sessions. Le code PIN d'accès n'est pas configuré ici : il
  # démarre à 000000 (changement forcé à la première connexion) et est persisté sur
  # le PVC (/app/data/auth_state.json). À surcharger en prod (ArgoCD > Parameters,
  # ou -f values-secret.yaml non commité), ne pas laisser cette valeur par défaut.
  auth:
    jwtSecret: "change-this-secret-in-production"
  # Identifiants OAuth Google Calendar (voir apps/home-lab/README.md pour la procédure).
  google:
    clientId: ""
    clientSecret: ""
    # Doit être enregistrée telle quelle dans Google Cloud Console. Google exige HTTPS
    # sauf pour localhost : la liaison initiale se fait donc via `kubectl port-forward`.
    redirectUri: "http://localhost:8000/calendar/oauth-callback"
    calendarId: "primary"
  # Identifiants GoCardless Bank Account Data (agrégateur PSD2, https://bankaccountdata.gocardless.com)
  # pour la synchronisation des comptes/livrets dans l'app Finances. Voir
  # apps/home-lab/README.md pour la procédure de création de compte et de liaison bancaire.
  gocardless:
    secretId: ""
    secretKey: ""
    # Même contrainte que Google : HTTPS requis sauf localhost, liaison via port-forward.
    # Un requisition GoCardless expire après ~90 jours (contrainte PSD2, pas notre code) :
    # il faudra relier périodiquement chaque compte.
    redirectUri: "http://localhost:8000/finance/link-callback"
  # Sources RSS de l'app Actualités, groupées par thématique. Modifiable ici sans
  # rebuild d'image : le fichier de config est monté depuis une ConfigMap (pas de
  # subPath), donc le backend prend en compte le changement sans redémarrage, dans
  # la minute qui suit un `helm upgrade` / sync ArgoCD.
  news:
    sources:
      actualite:
        label: "Actualité générale"
        sources:
          - name: "Le Monde"
            url: "https://www.lemonde.fr/rss/une.xml"
          - name: "France Info"
            url: "https://www.francetvinfo.fr/titres.rss"
      f1:
        label: "F1"
        sources:
          - name: "Motorsport.com"
            url: "https://www.motorsport.com/rss/f1/news/"
      tech:
        label: "Tech"
        sources:
          - name: "Numerama"
            url: "https://www.numerama.com/feed/"
          # URL non vérifiée, à remplacer par le vrai flux RSS de TLDR.
          - name: "TLDR"
            url: "https://www.example.com/a-remplacer-par-le-vrai-flux-rss"
      finance:
        label: "Finance"
        sources:
          - name: "Les Echos"
            url: "https://www.lesechos.fr/rss/rss_une_economie.xml"
          # URL non vérifiée, à remplacer par le vrai flux RSS d'Actionnaire.
          - name: "Actionnaire"
            url: "https://www.example.com/a-remplacer-par-le-vrai-flux-rss"
      international:
        label: "International"
        sources:
          - name: "BBC World"
            url: "http://feeds.bbci.co.uk/news/world/rss.xml"
          - name: "Le Monde International"
            url: "https://www.lemonde.fr/international/rss_full.xml"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ── Persistence (refresh token Google) ─────────────────────────────────────────
persistence:
  enabled: true
  size: 256Mi
  storageClass: ""
  accessMode: ReadWriteOnce

# ── Frontend ──────────────────────────────────────────────────────────────────
frontend:
  image:
    repository: ghcr.io/val-duss/home-lab-frontend
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 80
  # Préfixe de chemin pour servir le frontend (ex: /app/home-lab)
  pathPrefix: "/app/home-lab"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ── Services ──────────────────────────────────────────────────────────────────
service:
  backend:
    type: ClusterIP
    port: 8000
  frontend:
    type: ClusterIP
    port: 80

# ── Ingress ───────────────────────────────────────────────────────────────────
# Seul le frontend est exposé à l'extérieur du cluster. Le backend n'a plus
# d'ingress : le nginx du frontend proxy les appels /api vers le service backend
# en interne au cluster (voir frontend-configmap.yaml), donc peu importe l'adresse
# réseau utilisée par le navigateur pour joindre le frontend (IP LAN, Tailscale,
# nom DNS...) — seule cette adresse-là doit être joignable, le reste reste interne.
# host vide : règle "catch-all" accessible directement via l'IP du LoadBalancer
# de l'ingress controller — Kubernetes n'accepte pas une IP comme
# spec.rules[].host, seul un nom DNS y est autorisé.
ingress:
  enabled: true
  className: "nginx"
  host: ""
  frontend:
    path: "/app/home-lab"
    annotations: {}
  tls: []
