nameOverride: ""
fullnameOverride: ""

# ── Image pull secret (registre privé, ex: GHCR) ───────────────────────────────
# Référence un secret docker-registry existant dans le cluster (créé au préalable
# avec `kubectl create secret docker-registry ghcr-creds ...`).
imagePullSecrets:
  - name: ghcr-creds
# Ou laisse le chart créer le secret à partir d'identifiants (déconseillé si ce
# values.yaml est versionné en clair) :
# imageCredentials:
#   registry: ghcr.io
#   username: ""
#   password: ""

# ── Backend ───────────────────────────────────────────────────────────────────
backend:
  image:
    repository: ghcr.io/val-duss/home-lab-backend
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 8000
  # Code demandé à la première connexion et clé de signature des sessions.
  # À surcharger en prod (ArgoCD > Parameters, ou -f values-secret.yaml non commité),
  # ne pas laisser ces valeurs par défaut telles quelles.
  auth:
    accessCode: "change-me"
    jwtSecret: "change-this-secret-in-production"
  # Identifiants OAuth Google Calendar (voir apps/home-lab/README.md pour la procédure).
  google:
    clientId: ""
    clientSecret: ""
    # Doit être enregistrée telle quelle dans Google Cloud Console. Google exige HTTPS
    # sauf pour localhost : la liaison initiale se fait donc via `kubectl port-forward`.
    redirectUri: "http://localhost:8000/calendar/oauth-callback"
    calendarId: "primary"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ── Persistence (refresh token Google) ─────────────────────────────────────────
persistence:
  enabled: true
  size: 256Mi
  storageClass: ""
  accessMode: ReadWriteOnce

# ── Frontend ──────────────────────────────────────────────────────────────────
frontend:
  image:
    repository: ghcr.io/val-duss/home-lab-frontend
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 80
  # URL visible depuis le navigateur pour joindre le backend
  # (l'ingress controller est exposé sur le port 8080 en externe)
  apiUrl: "http://192.168.1.247:8080/app/home-lab/api"
  # Préfixe de chemin pour servir le frontend (ex: /app/home-lab)
  pathPrefix: "/app/home-lab"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ── Services ──────────────────────────────────────────────────────────────────
service:
  backend:
    type: ClusterIP
    port: 8000
  frontend:
    type: ClusterIP
    port: 80

# ── Ingress ───────────────────────────────────────────────────────────────────
# Front et back partagent le même host, distingués par chemin (comme todo-list).
# host vide : règle "catch-all" accessible directement via l'IP du LoadBalancer
# de l'ingress controller (192.168.1.247) — Kubernetes n'accepte pas une IP
# comme spec.rules[].host, seul un nom DNS y est autorisé.
ingress:
  enabled: true
  className: "nginx"
  host: ""
  frontend:
    path: "/app/home-lab"
    annotations: {}
  backend:
    # Le préfixe est retiré avant transmission au backend (routes FastAPI à la racine).
    path: "/app/home-lab/api"
    annotations:
      nginx.ingress.kubernetes.io/use-regex: "true"
      nginx.ingress.kubernetes.io/rewrite-target: /$2
  tls: []
