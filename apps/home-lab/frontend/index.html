<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Lab</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="gate">
    <h1>Home Lab</h1>

    <div id="pin-step">
      <p>Entre le code PIN à 6 chiffres pour continuer.</p>
      <form id="pin-form" class="gate-form">
        <input
          type="password"
          id="pin-input"
          class="pin-input"
          inputmode="numeric"
          pattern="[0-9]*"
          maxlength="6"
          placeholder="••••••"
          autocomplete="off"
          required
        />
        <button type="submit">Valider</button>
      </form>
    </div>

    <div id="change-pin-step" hidden>
      <p>Première connexion : choisis un nouveau code PIN à 6 chiffres.</p>
      <form id="change-pin-form" class="gate-form">
        <input
          type="password"
          id="new-pin-input"
          class="pin-input"
          inputmode="numeric"
          pattern="[0-9]*"
          maxlength="6"
          placeholder="Nouveau code"
          autocomplete="off"
          required
        />
        <input
          type="password"
          id="new-pin-confirm"
          class="pin-input"
          inputmode="numeric"
          pattern="[0-9]*"
          maxlength="6"
          placeholder="Confirmer"
          autocomplete="off"
          required
        />
        <button type="submit">Valider</button>
      </form>
    </div>

    <p id="gate-error" class="error"></p>
  </main>

  <main id="portal" hidden>
    <h1>Home Lab</h1>
    <div class="app-grid">
      <a class="app-card" href="calendar.html">
        <span class="app-card-icon">📅</span>
        <span class="app-card-name">Calendrier</span>
      </a>
      <a class="app-card" href="todo.html">
        <span class="app-card-icon">✅</span>
        <span class="app-card-name">Todo-list</span>
      </a>
      <a class="app-card" href="elec.html">
        <span class="app-card-icon">⚡</span>
        <span class="app-card-name">Électricité</span>
      </a>
      <a class="app-card" href="news.html">
        <span class="app-card-icon">📰</span>
        <span class="app-card-name">Actualités</span>
      </a>
    </div>
  </main>

  <script src="config.js"></script>
  <script src="session.js"></script>
  <script src="gate.js"></script>
</body>
</html>
