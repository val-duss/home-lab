apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: home-lab
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: home-lab
  source:
    repoURL: https://github.com/val-duss/home-lab.git
    targetRevision: main
    path: apps/home-lab/helm/home-lab
  destination:
    server: https://kubernetes.default.svc
    namespace: app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
