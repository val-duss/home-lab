services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend-data:/app/data
      - ./news_sources.json:/app/config/news_sources.json:ro
    environment:
      - JWT_SECRET=change-this-secret-in-production
      - GOOGLE_CLIENT_ID=
      - GOOGLE_CLIENT_SECRET=
      - GOOGLE_REDIRECT_URI=http://localhost:8000/calendar/oauth-callback
      - NEWS_SOURCES_FILE=/app/config/news_sources.json
      - GOCARDLESS_SECRET_ID=
      - GOCARDLESS_SECRET_KEY=
      - GOCARDLESS_REDIRECT_URI=http://localhost:8000/finance/link-callback
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/calendar.html:/usr/share/nginx/html/calendar.html:ro
      - ./frontend/todo.html:/usr/share/nginx/html/todo.html:ro
      - ./frontend/elec.html:/usr/share/nginx/html/elec.html:ro
      - ./frontend/news.html:/usr/share/nginx/html/news.html:ro
      - ./frontend/finance.html:/usr/share/nginx/html/finance.html:ro
      - ./frontend/notes.html:/usr/share/nginx/html/notes.html:ro
      - ./frontend/style.css:/usr/share/nginx/html/style.css:ro
      - ./frontend/session.js:/usr/share/nginx/html/session.js:ro
      - ./frontend/gate.js:/usr/share/nginx/html/gate.js:ro
      - ./frontend/calendar.js:/usr/share/nginx/html/calendar.js:ro
      - ./frontend/todo.js:/usr/share/nginx/html/todo.js:ro
      - ./frontend/news.js:/usr/share/nginx/html/news.js:ro
      - ./frontend/finance.js:/usr/share/nginx/html/finance.js:ro
      - ./frontend/notes.js:/usr/share/nginx/html/notes.js:ro
      - ./frontend/config.js:/usr/share/nginx/html/config.js:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  backend-data:
